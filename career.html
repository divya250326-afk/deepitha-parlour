<!DOCTYPE html>
<html>
<head>

<title>My Cart</title>
<style>
body{
font-family:Arial;
margin:0;
padding:20px;
background:#f5f5f5;
}

h2{
text-align:center;
}

.cart-container{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.cart-card{
width:250px;
border:1px solid #ddd;
border-radius:8px;
padding:10px;
text-align:center;
background:white;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.cart-card img{
width:100%;
height:180px;
object-fit:cover;
}

.price{
color:#ff2a6d;
font-weight:bold;
font-size:18px;
}

button{
padding:8px 15px;
background:red;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

.clear{
display:block;
margin:20px auto;
background:black;
}

.topbar{
text-align:center;
padding:10px 30px;
}

.topbar a{
text-decoration:none;
background:#ff2a6d;
color:white;
padding:8px 15px;
border-radius:5px;
}
</style>

</head>

<body>
  
<center>
    <div class="topbar">

<a href="index.html">back to home</a>
</div>
  

<h2>🛒 My Cart</h2>

<div class="cart-container" id="cartContainer"></div>

<button class="clear" onclick="clearCart()">Clear Cart</button>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const container = document.getElementById("cartContainer");

function displayCart(){

container.innerHTML="";

cart.forEach((item,index)=>{

const card = document.createElement("div");

card.classList.add("cart-card");

card.innerHTML = `
<img src="${item.image}">
<h3>${item.name}</h3>
<p class="price">${item.price}</p>
<button onclick="removeItem(${index})">Remove</button>
<button class="clear" onclick="bookAll()">Book All</button>
`;

container.appendChild(card);

});

}

function removeItem(index){

cart.splice(index,1);

localStorage.setItem("cart",JSON.stringify(cart));

displayCart();

}

function clearCart(){

localStorage.removeItem("cart");

cart=[];

displayCart();

}

displayCart();

function bookNow(service){

let phoneNumber = "916380397522"; 

let message = "Hello, I want to book this service: " + service.name;

let url = "https://wa.me/" + phoneNumber + "?text=" + encodeURIComponent(message);
alert(service.name + " you want to book");

window.open(url, "_blank");

let book = JSON.parse(localStorage.getItem("book")) || [];

book.push(service);

localStorage.setItem("book", JSON.stringify(book));



}
function bookAll() {
    if (cart.length === 0) {
        alert("Your cart is empty!");
        return;
    }

    // Create message with all items
    let message = "Hello, I want to book the following services:\n\n";
    cart.forEach((item, index) => {
        message += `${index + 1}. ${item.name} - ${item.price}\n`;
    });

    const phoneNumber = "916380397522"; // your WhatsApp number
    const url = "https://wa.me/" + phoneNumber + "?text=" + encodeURIComponent(message);

    window.open(url, "_blank");

    // Optional: move all items to 'book' storage
    let book = JSON.parse(localStorage.getItem("book")) || [];
    book = book.concat(cart);
    localStorage.setItem("book", JSON.stringify(book));

    alert("All services ready to book via WhatsApp!");
}

</script>

</body>
</html>
