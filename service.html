<!DOCTYPE html>
<html>
<head>
<title>Our Services</title>

<style>

body{
margin:0;
font-family:Arial;
}

#services{
background-image:url("https://img.freepik.com/free-photo/top-view-frame-with-make-up-items-copy-space_23-2148299588.jpg?semt=ais_rp_progressive&w=740&q=80");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
min-height:100vh;
padding:40px 0;
}

.services-container{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
padding:20px;
}

.service-card{
width:250px;
border:1px solid #ddd;
border-radius:8px;
overflow:hidden;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.1);
background:white;
}

.service-card img{
width:100%;
height:180px;
object-fit:cover;
}

.service-card h3{
margin:10px 0;
}

.price{
color:#ff2a6d;
font-weight:bold;
font-size:18px;
margin-bottom:10px;
}

button{
padding:8px 15px;
margin-bottom:15px;
background:#ff2a6d;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.topbar{
text-align:right;
padding:10px 30px;
}

.topbar a{
text-decoration:none;
background:#ff2a6d;
color:white;
padding:8px 15px;
border-radius:5px;
}

</style>
</head>

<body>

<div class="topbar">
<a href="career.html">🛒 View Cart</a>
<a href="index.html">back to home</a>
</div>


<section id="services">

<center>
<h2>Our Services</h2>
</center>

<div class="services-container" id="servicesContainer"></div>

</section>

<script>

const services = [

{ name: "Bridal Makeup", image: "bridal.webp", price: "₹15000" },

{ name: "Groom Makeup", image:"g.webp",price:"₹10000"},

{ name: "Hair Styling", image: "haircut.jpg", price: "₹1500" },

{ name: "Facial Treatment", image: "facial.jpg", price: "₹1200" },

{ name: "Party Makeup", image: "makeup.jpg", price: "₹2500" },

{ name: "Mehendi", image:"mehndi.jpg", price:"₹1000" },

{ name: " Manicure Pedicure", image:"mani.avif",price:"₹2000"}

];

const container = document.getElementById("servicesContainer");

services.forEach(service => {

const card = document.createElement("div");

card.classList.add("service-card");

card.innerHTML = `
<img src="${service.image}">
<h3>${service.name}</h3>
<p class="price">${service.price}</p>
<button onclick='addToCart(${JSON.stringify(service)})'>Add to Cart</button>
<button onclick='bookNow(${JSON.stringify(service)})'>Book Now</button>
`;

container.appendChild(card);

});

function addToCart(service){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

cart.push(service);

localStorage.setItem("cart", JSON.stringify(cart));

alert(service.name + " Added to Cart");

}



</script>

</body>
</html>
